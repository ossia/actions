name: 'Package avendish Python Addon'
description: 'Collects an avendish-built Python extension addon (one .so/.pyd per port), signs on macOS/Windows when secrets are provided, and zips into a flat distributable directory.'
# TODO: produce a real wheel via cibuildwheel for pip-installable distribution
inputs:
  addon-name:
    description: 'Name of the addon (used as Python package folder and zip prefix)'
    required: true
  addon-path:
    description: 'Path to addon source root (LICENSE / README live here)'
    required: false
    default: '.'
  build-dir:
    description: 'Directory where avendish wrote the per-backend output (Python extensions expected under <build-dir>/python/)'
    required: false
    default: 'build'
  output-dir:
    description: 'Directory where the packaged zip will be written'
    required: false
    default: 'package'
  os-tag:
    description: 'OS tag used in artifact name: linux | macos | windows'
    required: true
  arch-tag:
    description: 'Architecture tag used in artifact name: x86_64 | arm64'
    required: true
  macos-certificate-base64:
    description: 'Base64-encoded P12 certificate for macOS code signing (optional)'
    required: false
    default: ''
  macos-certificate-password:
    description: 'Password for macOS P12 certificate (optional)'
    required: false
    default: ''
  macos-notarize-team-id:
    description: 'Apple Developer Team ID for notarization (optional)'
    required: false
    default: ''
  macos-notarize-apple-id:
    description: 'Apple ID for notarization (optional)'
    required: false
    default: ''
  macos-notarize-password:
    description: 'App-specific password for notarization (optional)'
    required: false
    default: ''
  windows-certificate-base64:
    description: 'Base64-encoded PFX certificate for Windows code signing (optional)'
    required: false
    default: ''
  windows-certificate-password:
    description: 'Password for Windows PFX certificate (optional)'
    required: false
    default: ''

outputs:
  zip-path:
    description: 'Absolute path to the produced zip file'
    value: ${{ steps.zip.outputs.zip-path }}

runs:
  using: 'composite'
  steps:
    - name: Import code signing certificate (macOS)
      if: runner.os == 'macOS' && inputs.macos-certificate-base64 != ''
      uses: Apple-Actions/import-codesign-certs@v7
      with:
        p12-file-base64: ${{ inputs.macos-certificate-base64 }}
        p12-password: ${{ inputs.macos-certificate-password }}

    - name: Prepare paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.output-dir }}"
        OUTPUT_DIR="$(cd "${{ inputs.output-dir }}" && pwd)"
        PKG_DIR="$OUTPUT_DIR/${{ inputs.addon-name }}"
        rm -rf "$PKG_DIR"
        mkdir -p "$PKG_DIR"
        ZIP_NAME="${{ inputs.addon-name }}-python-${{ inputs.os-tag }}-${{ inputs.arch-tag }}.zip"
        ZIP_PATH="$OUTPUT_DIR/$ZIP_NAME"
        echo "PY_OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
        echo "PY_PKG_DIR=$PKG_DIR" >> "$GITHUB_ENV"
        echo "PY_ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
        echo "PY_ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

    - name: Collect Python extension modules
      shell: bash
      run: |
        set -euo pipefail
        PY_DIR="${{ inputs.build-dir }}/python"
        if [[ ! -d "$PY_DIR" ]]; then
          echo "Error: Python build output directory '$PY_DIR' does not exist"
          ls -la "${{ inputs.build-dir }}" || true
          exit 1
        fi

        echo "Looking for Python extensions in $PY_DIR:"
        ls -la "$PY_DIR" || true

        # avendish emits py<C_NAME>.{so,pyd} per port — PREFIX stripped, no ABI tag.
        FOUND=0
        while IFS= read -r -d '' f; do
          base="$(basename "$f")"
          case "$base" in
            py*.so|py*.pyd)
              echo "Copying extension: $f"
              cp -f "$f" "$PY_PKG_DIR/"
              FOUND=$((FOUND + 1))
              ;;
          esac
        done < <(find "$PY_DIR" -maxdepth 2 -type f \( -name 'py*.so' -o -name 'py*.pyd' \) -print0)

        if [[ "$FOUND" -eq 0 ]]; then
          echo "Error: no py*.so / py*.pyd files found under '$PY_DIR'"
          exit 1
        fi
        echo "Collected $FOUND Python extension module(s)."

    - name: Generate __init__.py
      shell: bash
      run: |
        set -euo pipefail
        cat > "$PY_PKG_DIR/__init__.py" <<'PYEOF'
        # Auto-generated by ossia/actions/package-python-addon.
        # Re-exports every compiled avendish port (py<port>) as an attribute of this package.
        import importlib as _importlib
        import glob as _glob
        import os as _os

        _here = _os.path.dirname(__file__)
        for _f in _glob.glob(_os.path.join(_here, 'py*.*')):
            _ext = _os.path.splitext(_f)[1].lower()
            if _ext not in ('.so', '.pyd'):
                continue
            _name = _os.path.splitext(_os.path.basename(_f))[0]
            try:
                globals()[_name] = _importlib.import_module('.' + _name, package=__name__)
            except Exception as _exc:
                # Surface the failure but don't break the whole package import on a single bad port.
                import sys as _sys
                print('package-python-addon: failed to import {}: {}'.format(_name, _exc), file=_sys.stderr)

        del _importlib, _glob, _os
        PYEOF
        echo "Generated $PY_PKG_DIR/__init__.py"

    - name: Sign Python extensions (macOS)
      if: runner.os == 'macOS' && inputs.macos-certificate-base64 != ''
      shell: bash
      run: |
        set -euo pipefail
        IDENTITY="ossia.io"

        shopt -s nullglob
        for so in "$PY_PKG_DIR"/py*.so; do
          echo "Codesigning $so"
          codesign --deep --force --options runtime --timestamp \
            --sign "$IDENTITY" "$so"
          codesign --verify --verbose=2 "$so" || true
        done

    - name: Notarize Python extensions (macOS, best-effort)
      if: runner.os == 'macOS' && inputs.macos-certificate-base64 != '' && inputs.macos-notarize-team-id != '' && inputs.macos-notarize-apple-id != '' && inputs.macos-notarize-password != ''
      shell: bash
      run: |
        # Loose .so files cannot be stapled (stapler requires a bundle/dmg/pkg),
        # but we can still submit a zip for notarization to validate the signature.
        # Failures here are non-fatal: signed-but-not-notarized .so files still load.
        set +e
        TEAM_ID="${{ inputs.macos-notarize-team-id }}"
        APPLE_ID="${{ inputs.macos-notarize-apple-id }}"
        APP_PWD="${{ inputs.macos-notarize-password }}"

        TMPZIP="$(mktemp -u).zip"
        ( cd "$PY_PKG_DIR" && ditto -c -k --keepParent . "$TMPZIP" )

        echo "Submitting $TMPZIP for notarization (best-effort)"
        xcrun notarytool submit "$TMPZIP" \
          --team-id "$TEAM_ID" \
          --apple-id "$APPLE_ID" \
          --password "$APP_PWD" \
          --wait || echo "warning: notarization submission failed; continuing with signed-only artifacts"

        rm -f "$TMPZIP"
        # Note: stapling loose .so files is not supported by xcrun stapler — skipping.

    - name: Sign Python extensions (Windows)
      if: runner.os == 'Windows' && inputs.windows-certificate-base64 != ''
      shell: bash
      run: |
        set -euo pipefail

        PFX_FILE="$(mktemp -u).pfx"
        echo "${{ inputs.windows-certificate-base64 }}" | base64 -d > "$PFX_FILE"

        SIGNTOOL=""
        for candidate in \
            "/c/Program Files (x86)/Windows Kits/10/bin/x64/signtool.exe" \
            "/c/Program Files (x86)/Windows Kits/10/App Certification Kit/signtool.exe"; do
          if [[ -e "$candidate" ]]; then
            SIGNTOOL="$candidate"
            break
          fi
        done
        if [[ -z "$SIGNTOOL" ]]; then
          SIGNTOOL=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name 'signtool.exe' -path '*x64*' 2>/dev/null | sort -r | head -1)
        fi
        if [[ -z "$SIGNTOOL" || ! -e "$SIGNTOOL" ]]; then
          echo "Error: signtool.exe not found"
          rm -f "$PFX_FILE"
          exit 1
        fi
        echo "Using signtool: $SIGNTOOL"

        PWD_ARG='${{ inputs.windows-certificate-password }}'

        shopt -s nullglob
        for pyd in "$PY_PKG_DIR"/py*.pyd; do
          echo "Signing $pyd"
          "$SIGNTOOL" sign //f "$PFX_FILE" //p "$PWD_ARG" \
            //tr http://timestamp.digicert.com //td sha256 //fd sha256 \
            "$pyd"
        done

        rm -f "$PFX_FILE"

    - name: Copy LICENSE/README
      shell: bash
      run: |
        set -euo pipefail
        for f in LICENSE LICENSE.txt LICENSE.md README README.md README.txt; do
          SRC="${{ inputs.addon-path }}/$f"
          if [[ -f "$SRC" ]]; then
            echo "Copying $SRC"
            cp -f "$SRC" "$PY_PKG_DIR/"
          fi
        done

    - name: Display package contents
      shell: bash
      run: |
        set -euo pipefail
        echo "Package contents for $PY_PKG_DIR:"
        ls -la "$PY_PKG_DIR"

    - name: Create zip
      id: zip
      shell: bash
      run: |
        set -euo pipefail
        cd "$PY_OUTPUT_DIR"
        rm -f "$PY_ZIP_PATH"
        if command -v zip >/dev/null 2>&1; then
          zip -r "$PY_ZIP_NAME" "${{ inputs.addon-name }}"
        elif command -v 7z >/dev/null 2>&1; then
          7z a -tzip "$PY_ZIP_NAME" "${{ inputs.addon-name }}"
        else
          powershell -NoProfile -Command "Compress-Archive -Path '${{ inputs.addon-name }}' -DestinationPath '$PY_ZIP_NAME' -Force"
        fi
        echo "Created zip: $PY_ZIP_PATH"
        ls -la "$PY_ZIP_PATH"
        ZIP_PATH_OUT="$PY_ZIP_PATH"
        command -v cygpath >/dev/null 2>&1 && ZIP_PATH_OUT="$(cygpath -w "$PY_ZIP_PATH")"
        echo "zip-path=$ZIP_PATH_OUT" >> "$GITHUB_OUTPUT"
