name: CMake build (SDK)

on:
  workflow_call:
    inputs:
      targets:
        description: 'Space-separated os/arch triples to build (empty = all).'
        required: false
        default: ''
        type: string

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: filter
        shell: bash
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          configs='[
            {"name":"Windows","triple":"windows/x86_64","os":"windows-latest","dependencies":"curl -L -O https://github.com/ninja-build/ninja/releases/download/v1.13.1/ninja-win.zip && unzip ninja-win.zip","additional_flags":"-GNinja"},
            {"name":"Ubuntu","triple":"linux/x86_64","os":"ubuntu-latest","dependencies":"sudo apt -y update; sudo apt install -yqq libgl-dev libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev libxcomposite-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb-*-dev libX11-*-dev libz-dev libtinfo6 libxext-dev","additional_flags":""},
            {"name":"macOS","triple":"macos/arm64","os":"macos-15","dependencies":"","additional_flags":""}
          ]'
          if [ -z "${TARGETS// }" ]; then
            matrix="$configs"
          else
            matrix=$(jq -c --arg t "$TARGETS" '[ .[] | select( .triple as $tr | ($t | split(" ") | map(select(. != ""))) | index($tr) ) ]' <<< "$configs")
          fi
          echo "matrix=$(jq -c . <<< "$matrix")" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    name: "SDK ${{ matrix.config.name }} ${{ matrix.version }}"
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        version: [ "latest", "continuous" ]
        config: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Support longpaths
        run: git config --global core.longpaths true

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.config.name == 'macOS' }}
        with:
         xcode-version: '>=16.4'

      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          path: addon

      - name: Install dependencies
        if: matrix.config.dependencies != ''
        shell: bash
        run: |
          ${{ matrix.config.dependencies }}

      - name: Download OSSIA SDK
        uses: ossia/actions/download-ossia-sdk@master
        id: ossia-sdk

      - name: Download Score SDK
        uses: ossia/actions/download-score-sdk@master
        id: score-sdk
        with:
          version: "${{ matrix.version }}"
          extract-path: "./sdk"

      - name: Build debug
        uses: ossia/actions/build-addon@master
        with:
          addon-path: addon
          build-type: Debug
          score-sdk-path: ${{ steps.score-sdk.outputs.sdk-path }}
          ossia-sdk-path: ${{ steps.ossia-sdk.outputs.sdk-path }}
          additional-flags: ${{ matrix.config.additional_flags }}

      - name: Build release
        uses: ossia/actions/build-addon@master
        with:
          addon-path: addon
          build-type: Release
          score-sdk-path: ${{ steps.score-sdk.outputs.sdk-path }}
          ossia-sdk-path: ${{ steps.ossia-sdk.outputs.sdk-path }}
          additional-flags: ${{ matrix.config.additional_flags }}

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.config.os }}
          path: |
            install/*

  package:
    name: Package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Package addon
        uses: ossia/actions/package-addon@master

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: deploy
