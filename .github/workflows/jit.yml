name: JIT

on:
  workflow_call:
    inputs:
      targets:
        description: 'Space-separated os/arch triples to build (empty = all).'
        required: false
        default: ''
        type: string

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: filter
        shell: bash
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          configs='[
            {"name":"Windows","triple":"windows/x86_64","os":"windows-latest"},
            {"name":"Ubuntu","triple":"linux/x86_64","os":"ubuntu-latest"},
            {"name":"macOS","triple":"macos/arm64","os":"macos-15"}
          ]'
          if [ -z "${TARGETS// }" ]; then
            matrix="$configs"
          else
            matrix=$(jq -c --arg t "$TARGETS" '[ .[] | select( .triple as $tr | ($t | split(" ") | map(select(. != ""))) | index($tr) ) ]' <<< "$configs")
          fi
          echo "matrix=$(jq -c . <<< "$matrix")" >> "$GITHUB_OUTPUT"

  jit:
    needs: setup
    name: "JIT ${{ matrix.config.name }} ${{ matrix.version }}"
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        version: [ "latest", "continuous" ]
        config: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Support longpaths
        run: git config --global core.longpaths true

      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          path: addon

      - name: Download Score SDK
        uses: ossia/actions/download-score-sdk@master
        with:
          version: "${{ matrix.version }}"
          extract-path: "./sdk"

      # Runtime libs the score AppImage expects from the system.
      - name: Install runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libv4l-0

      - name: JIT compile test
        uses: ossia/actions/jit-compile@master
        with:
          score-version: ${{ matrix.version }}
          sdk-path: "./sdk/usr"
          addon-path: "./addon"
