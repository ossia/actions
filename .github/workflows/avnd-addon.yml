            -DCMAKE_BUILD_TYPE=Release \
            -DBOOST_ROOT="$PWD/boost" \
            -DBoost_INCLUDE_DIR="$PWD/boost/include" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DAVND_ENABLE_WASM=ON
          cmake --build addon/build --config Release
      - name: Package wasm backend
        id: package
        uses: ossia/actions/package-wasm-addon@drop-ossia-sdk-dep
        with:
          addon-name: ${{ github.event.repository.name }}
          addon-path: addon
          build-dir: addon/build
          output-dir: package
          os-tag: ${{ matrix.os-tag }}
          arch-tag: ${{ matrix.arch-tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.os-tag }}-${{ matrix.arch-tag }}
          path: ${{ steps.package.outputs.zip-path }}

  # ---------------- release-continuous ----------------
  release-continuous:
    name: Publish continuous release
    needs: [pd, max, vst3, clap, vintage, touchdesigner, python, godot, standalone, gstreamer, wasm, pd-composite, max-composite, godot-composite]
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for tag setup)
        uses: actions/checkout@v4

      - name: Download all backend artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # actions/download-artifact@v4 creates one dir per artifact; each dir
          # contains exactly one *.zip. Flatten them all into dist/.
          find incoming -type f -name '*.zip' -exec cp -v {} dist/ \;
          echo "Final release payload:"
          ls -lah dist/

      - name: Recreate the 'continuous' release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # upload-release-action below handles re-uploading assets to an
          # existing tag, but a moving tag with stale assets sometimes confuses
          # GitHub's release UI. Delete the release (but keep the tag floating)
          # before uploading, then svenstaro/upload-release-action will create
          # a fresh prerelease with the correct sha as target.
          if gh release view continuous >/dev/null 2>&1; then
            gh release delete continuous --yes --cleanup-tag || \
              gh release delete continuous --yes || true
          fi

      - name: Upload to continuous prerelease
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: continuous
          prerelease: true
          overwrite: true
          file_glob: true
          file: dist/*.zip
          target_commit: ${{ github.sha }}
          body: |
            Continuous build from ${{ github.sha }}
            Built: ${{ github.event.head_commit.timestamp }}
