# Avendish addon CI - reusable workflow
#
# Builds an avendish-based addon for any subset of the 12 supported
# backends across every OS/arch combination each backend supports, packages
# every produced artifact into an end-user-friendly zip, and publishes the
# zips to a single rolling "continuous" GitHub prerelease on every push to
# main / master.
#
# Usage in a caller repository (.github/workflows/builds.yaml):
#
#   name: Build
#   on:
#     push:
#       branches: [main, master]
#     pull_request:
#   concurrency:
#     group: ${{ github.workflow }}-${{ github.ref }}
#     cancel-in-progress: true
#   jobs:
#     build:
#       uses: ossia/actions/.github/workflows/avnd-addon.yml@master
#       secrets: inherit
#       with:
#         pd: true
#         vst3: true
#         clap: true
#
# For the score backend, use the dedicated `score-addon.yml` reusable
# workflow (different build orchestration — requires a score source/SDK
# checkout). Run both workflows side-by-side in a caller's `builds.yaml`
# if the addon ships both as a score plugin and as standalone backends.
#
# Composite vs per-OS artifacts:
#   Backends with `*-composite` in their artifact name ship as a single
#   cross-platform archive (max, pd, godot). The matching per-OS
#   artifacts are still produced for users who want to inspect
#   individual platform builds, but the canonical user-facing download
#   is the composite zip.
#
# Inputs (all booleans, default false - flip to true to enable that backend):
#   pd             Pure Data external      linux/x86_64, macos/arm64, windows/x86_64
#   max            Max/MSP external                     macos/arm64, windows/x86_64
#   vst3           VST3 plugin             linux/x86_64, macos/arm64, windows/x86_64
#   clap           CLAP plugin             linux/x86_64, macos/arm64, windows/x86_64
#   vintage        VintageDSP / LV2-like                macos/arm64, windows/x86_64
#   touchdesigner  TouchDesigner CHOP                   macos/arm64, windows/x86_64
#   python         Python module           linux/x86_64, macos/arm64, windows/x86_64
#   godot          Godot GDExtension       linux/x86_64, macos/arm64, windows/x86_64
#   standalone     standalone executable   linux/x86_64, macos/arm64, windows/x86_64
#   gstreamer      GStreamer plugin        linux/x86_64, macos/arm64
#   wasm           WebAssembly (emscripten) linux/x86_64
#
# Secrets (all optional - signing / notarization is a no-op without them):
#   MAC_CERT_B64            Base64-encoded P12 certificate
#   MAC_CERT_PASSWORD       P12 password
#   APPLE_TEAM_ID           Apple Developer Team ID
#   APPLE_ID                Apple ID for notarytool
#   APPLE_ALTOOL_PASSWORD   App-specific notarization password
#   WIN_CERT_B64            Base64-encoded PFX certificate
#   WIN_CERT_PASSWORD       PFX password

name: Avendish addon CI

on:
  workflow_call:
    inputs:
      pd:
        description: 'Build Pure Data external backend'
        required: false
        type: boolean
        default: false
      max:
        description: 'Build Max/MSP external backend'
        required: false
        type: boolean
        default: false
      vst3:
        description: 'Build VST3 backend'
        required: false
        type: boolean
        default: false
      clap:
        description: 'Build CLAP backend'
        required: false
        type: boolean
        default: false
      vintage:
        description: 'Build VintageDSP backend'
        required: false
        type: boolean
        default: false
      touchdesigner:
        description: 'Build TouchDesigner backend'
        required: false
        type: boolean
        default: false
      python:
        description: 'Build Python backend'
        required: false
        type: boolean
        default: false
      godot:
        description: 'Build Godot GDExtension backend'
        required: false
        type: boolean
        default: false
      standalone:
        description: 'Build standalone executable backend'
        required: false
        type: boolean
        default: false
      gstreamer:
        description: 'Build GStreamer backend'
        required: false
        type: boolean
        default: false
      wasm:
        description: 'Build WebAssembly (emscripten) backend'
        required: false
        type: boolean
        default: false
    secrets:
      MAC_CERT_B64:
        required: false
      MAC_CERT_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_ID:
        required: false
      APPLE_ALTOOL_PASSWORD:
        required: false
      WIN_CERT_B64:
        required: false
      WIN_CERT_PASSWORD:
        required: false

# Shared anchors are not supported in GitHub Actions YAML; the per-backend
# jobs below are intentionally near-identical and mostly differ only in the
# backend name, the matrix, and the -D flag passed to CMake.
#
# CMake flag convention (uppercase):  -DAVND_ENABLE_<BACKEND>=ON
#
# Each per-backend job inlines its own SDK fetch (mirroring the proven
# pattern in the `avendish-template/action.yml` composite action) so this
# workflow works for addons whose dependencies.cmake just FetchContents
# avendish (e.g. celtera/avendish-*-processor-template) without any need
# for the ossia/score SDK bundle.

jobs:
  # ---------------- pd ----------------
  pd:
    name: "pd (${{ matrix.os-tag }}/${{ matrix.arch-tag }})"
    if: ${{ inputs.pd }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,    os-tag: linux,   arch-tag: x86_64 }
          - { os: macos-15,        os-tag: macos,   arch-tag: arm64  }
          - { os: windows-latest,  os-tag: windows, arch-tag: x86_64 }
    steps:
      - name: Support longpaths
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true
      - uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: '>=16.4'
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: addon
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 puredata-dev jq zip
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install pure-data jq || true
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install -y puredata jq zip ninja
      - name: Checkout PureData headers
        if: runner.os != 'Windows'
        uses: actions/checkout@v4
        with:
          repository: pure-data/pure-data
          path: puredata
      - name: Download Pd Windows binary (provides pd.lib)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # avendish.pd.cmake does find_library(PD_LIB NAMES pd) on Windows.
          # The official Pd .msw.zip ships src/ headers + bin/pd.lib (the MSVC
          # import lib), unlike the pure-data/pure-data git checkout which is
          # source-only. Mirrors how libossia's ossia-pd provisions pd on Windows.
          PD_VERSION="0.55-2"
          curl -fsSL "http://msp.ucsd.edu/Software/pd-${PD_VERSION}.msw.zip" -o pd.zip
          cmake -E tar xf pd.zip
          echo "PD_WIN_ROOT=$PWD/pd-${PD_VERSION}" >> "$GITHUB_ENV"
      - name: Set up Boost
        shell: bash
        run: |
          curl -fsSL https://github.com/ossia/score-sdk/releases/download/sdk31/boost_1_90_0.tar.gz -o boost.tar.gz
          mkdir -p boost/include
          tar -xzf boost.tar.gz --strip-components=1 -C boost/include
      - name: Configure & build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
            PD_INCLUDE="$PD_WIN_ROOT/src"
            PD_LIBARG=(-DCMAKE_LIBRARY_PATH="$PD_WIN_ROOT/bin")
          else
            PD_INCLUDE="$PWD/puredata/src"
            PD_LIBARG=()
          fi
          cmake -S addon -B addon/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INCLUDE_PATH="$PD_INCLUDE" \
            "${PD_LIBARG[@]}" \
            -DBOOST_ROOT="$PWD/boost" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
            -DAVND_ENABLE_PD=ON
          cmake --build addon/build --config Release
      - name: Package pd backend
        id: package
        uses: ossia/actions/package-pd-addon@drop-ossia-sdk-dep
        with:
          addon-name: ${{ github.event.repository.name }}
          addon-path: addon
          build-dir: addon/build
          output-dir: package
          os-tag: ${{ matrix.os-tag }}
          arch-tag: ${{ matrix.arch-tag }}
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.APPLE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.APPLE_ID }}
          macos-notarize-password: ${{ secrets.APPLE_ALTOOL_PASSWORD }}
          windows-certificate-base64: ${{ secrets.WIN_CERT_B64 }}
          windows-certificate-password: ${{ secrets.WIN_CERT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: pd-${{ matrix.os-tag }}-${{ matrix.arch-tag }}
          path: ${{ steps.package.outputs.zip-path }}

  # ---------------- pd-composite ----------------
  # Pure Data via Deken expects a single cross-platform folder containing
  # *.pd_linux + *.pd_darwin + *.dll side-by-side. We unzip every per-OS
  # pd artifact and union their contents into one staging dir.
  pd-composite:
    if: ${{ inputs.pd }}
    needs: pd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pd-*
          merge-multiple: false
          path: per-os
      - name: Install zip tools
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 zip unzip
      - name: Merge per-OS Pd artifacts
        shell: bash
        run: |
          set -euo pipefail
          ADDON="${{ github.event.repository.name }}"
          mkdir -p "staging/$ADDON"

          shopt -s nullglob
          ZIPS=( per-os/*/${ADDON}-pd-*.zip )
          if [[ ${#ZIPS[@]} -eq 0 ]]; then
            echo "Error: no per-OS pd artifacts found under per-os/"
            ls -lR per-os || true
            exit 1
          fi

          for z in "${ZIPS[@]}"; do
            dest="unzipped-$(basename "$z" .zip)"
            mkdir -p "$dest"
            unzip -o "$z" -d "$dest"
            # Union every file from <addon>/ into staging/<addon>/.
            if [[ -d "$dest/$ADDON" ]]; then
              cp -Rn "$dest/$ADDON/." "staging/$ADDON/" 2>/dev/null || \
                cp -R "$dest/$ADDON/." "staging/$ADDON/"
            fi
            rm -rf "$dest"
          done

          echo "Composite Pd package contents:"
          find "staging/$ADDON" -maxdepth 3 -print

          (cd staging && zip -r "../${ADDON}-pd-composite.zip" "$ADDON")
          ls -lah "${ADDON}-pd-composite.zip"
      # TODO: optionally produce a .dek package via the Deken CLI
      #   (`pip install hexbinder/deken` or fetch upstream tarball).
      #   The plain zip is enough for v1.
      - uses: actions/upload-artifact@v4
        with:
          name: pd-composite
          path: '*-pd-composite.zip'

  # ---------------- max ----------------
  max:
    name: "max (${{ matrix.os-tag }}/${{ matrix.arch-tag }})"
    if: ${{ inputs.max }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-15,        os-tag: macos,   arch-tag: arm64  }
          - { os: windows-latest,  os-tag: windows, arch-tag: x86_64 }
    steps:
      - name: Support longpaths
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true
      - uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: '>=16.4'
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: addon
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install jq || true
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install -y jq zip ninja
      - name: Checkout Max SDK
        uses: actions/checkout@v4
        with:
          repository: jcelerier/max-sdk-base
          submodules: recursive
          path: max-sdk-base
      - name: Set up Boost
        shell: bash
        run: |
          curl -fsSL https://github.com/ossia/score-sdk/releases/download/sdk31/boost_1_90_0.tar.gz -o boost.tar.gz
          mkdir -p boost/include
          tar -xzf boost.tar.gz --strip-components=1 -C boost/include
      - name: Configure & build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S addon -B addon/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAVND_MAXSDK_PATH="$PWD/max-sdk-base" \
            -DBOOST_ROOT="$PWD/boost" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
            -DAVND_ENABLE_MAX=ON
          cmake --build addon/build --config Release
      - name: Package max backend
        id: package
        uses: ossia/actions/package-max-addon@drop-ossia-sdk-dep
        with:
          addon-name: ${{ github.event.repository.name }}
          addon-path: addon
          build-dir: addon/build
          output-dir: package
          os-tag: ${{ matrix.os-tag }}
          arch-tag: ${{ matrix.arch-tag }}
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.APPLE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.APPLE_ID }}
          macos-notarize-password: ${{ secrets.APPLE_ALTOOL_PASSWORD }}
          windows-certificate-base64: ${{ secrets.WIN_CERT_B64 }}
          windows-certificate-password: ${{ secrets.WIN_CERT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: max-${{ matrix.os-tag }}-${{ matrix.arch-tag }}
          path: ${{ steps.package.outputs.zip-path }}

  # ---------------- max-composite ----------------
  # Max Packages contain externals/<port>.mxo (macOS bundle) +
  # externals/<port>.mxe64 (Windows). Both OS binaries live side-by-side in
  # the same externals/ folder. We unzip every per-OS max artifact, union
  # externals/ + help/ + extras/ into one staging dir, and re-zip.
  max-composite:
    if: ${{ inputs.max }}
    needs: max
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: max-*
          merge-multiple: false
          path: per-os
      - name: Install zip tools and jq
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 zip unzip jq
      - name: Merge per-OS Max artifacts
        shell: bash
        run: |
          set -euo pipefail
          ADDON="${{ github.event.repository.name }}"
          mkdir -p "staging/$ADDON"/{externals,help,extras}

          shopt -s nullglob
          ZIPS=( per-os/*/${ADDON}-max-*.zip )
          if [[ ${#ZIPS[@]} -eq 0 ]]; then
            echo "Error: no per-OS max artifacts found under per-os/"
            ls -lR per-os || true
            exit 1
          fi

          PKG_INFO_TAKEN=0
          for z in "${ZIPS[@]}"; do
            dest="unzipped-$(basename "$z" .zip)"
            mkdir -p "$dest"
            unzip -o "$z" -d "$dest"

            SRC="$dest/$ADDON"
            if [[ ! -d "$SRC" ]]; then
              echo "Warning: per-OS zip $z had no $ADDON/ root, skipping"
              rm -rf "$dest"
              continue
            fi

            # Union externals/ (preserve .mxo bundle structure with cp -R)
            if [[ -d "$SRC/externals" ]]; then
              cp -R "$SRC/externals/." "staging/$ADDON/externals/" 2>/dev/null || true
            fi
            # Union help/ and extras/ if present
            if [[ -d "$SRC/help" ]]; then
              cp -R "$SRC/help/." "staging/$ADDON/help/" 2>/dev/null || true
            fi
            if [[ -d "$SRC/extras" ]]; then
              cp -R "$SRC/extras/." "staging/$ADDON/extras/" 2>/dev/null || true
            fi
            # Take the first package-info.json + LICENSE/README we see
            if [[ "$PKG_INFO_TAKEN" -eq 0 && -f "$SRC/package-info.json" ]]; then
              cp -f "$SRC/package-info.json" "staging/$ADDON/"
              PKG_INFO_TAKEN=1
            fi
            for f in LICENSE LICENSE.txt LICENSE.md README README.md README.txt; do
              if [[ -f "$SRC/$f" && ! -f "staging/$ADDON/$f" ]]; then
                cp -f "$SRC/$f" "staging/$ADDON/"
              fi
            done

            rm -rf "$dest"
          done

          # Mark composite package as multi-OS in package-info.json
          if [[ -f "staging/$ADDON/package-info.json" ]] && command -v jq >/dev/null 2>&1; then
            jq '.os = ["macos","windows"]' "staging/$ADDON/package-info.json" > /tmp/pi.json
            mv /tmp/pi.json "staging/$ADDON/package-info.json"
          fi

          echo "Composite Max package contents:"
          find "staging/$ADDON" -maxdepth 3 -print

          # -y preserves symlinks (matters for .mxo bundles on macOS)
          (cd staging && zip -ry "../${ADDON}-max-composite.zip" "$ADDON")
          ls -lah "${ADDON}-max-composite.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: max-composite
          path: '*-max-composite.zip'

  # ---------------- vst3 ----------------
  vst3:
    name: "vst3 (${{ matrix.os-tag }}/${{ matrix.arch-tag }})"
    if: ${{ inputs.vst3 }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,    os-tag: linux,   arch-tag: x86_64 }
          - { os: macos-15,        os-tag: macos,   arch-tag: arm64  }
          - { os: windows-latest,  os-tag: windows, arch-tag: x86_64 }
    steps:
      - name: Support longpaths
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true
      - uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: '>=16.4'
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: addon
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 libgl-dev libx11-dev libxcb1-dev jq zip
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install jq || true
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install -y jq zip ninja
      - name: Checkout VST3 SDK
        uses: actions/checkout@v4
        with:
          repository: steinbergmedia/vst3sdk
          submodules: recursive
          path: vst3sdk
      - name: Set up Boost
        shell: bash
        run: |
          curl -fsSL https://github.com/ossia/score-sdk/releases/download/sdk31/boost_1_90_0.tar.gz -o boost.tar.gz
          mkdir -p boost/include
          tar -xzf boost.tar.gz --strip-components=1 -C boost/include
      - name: Configure & build
        shell: bash
        run: |
          set -euo pipefail
          EXTRA=()
          # Xcode 26's SDK no longer transitively provides std::terminate to
          # the VST3 SDK's threadchecker_mac.mm.
          if [ "$RUNNER_OS" = "macOS" ]; then
            EXTRA+=( "-DCMAKE_CXX_FLAGS=-include exception" )
          fi
          cmake -S addon -B addon/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DVST3_SDK_ROOT="$PWD/vst3sdk" \
            -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF \
            -DSMTG_ADD_VSTGUI=OFF \
            -DSMTG_CREATE_PLUGIN_LINK=OFF \
            -DSMTG_RUN_VST_VALIDATOR=OFF \
            -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF \
            -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF \
            -DBOOST_ROOT="$PWD/boost" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
            -DAVND_ENABLE_VST3=ON \
            "${EXTRA[@]}"
          cmake --build addon/build --config Release
      - name: Package vst3 backend
        id: package
        uses: ossia/actions/package-vst3-addon@drop-ossia-sdk-dep
        with:
          addon-name: ${{ github.event.repository.name }}
          addon-path: addon
          build-dir: addon/build
          output-dir: package
          os-tag: ${{ matrix.os-tag }}
          arch-tag: ${{ matrix.arch-tag }}
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.APPLE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.APPLE_ID }}
          macos-notarize-password: ${{ secrets.APPLE_ALTOOL_PASSWORD }}
          windows-certificate-base64: ${{ secrets.WIN_CERT_B64 }}
          windows-certificate-password: ${{ secrets.WIN_CERT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: vst3-${{ matrix.os-tag }}-${{ matrix.arch-tag }}
          path: ${{ steps.package.outputs.zip-path }}

  # ---------------- clap ----------------
  clap:
    name: "clap (${{ matrix.os-tag }}/${{ matrix.arch-tag }})"
    if: ${{ inputs.clap }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,    os-tag: linux,   arch-tag: x86_64 }
          - { os: macos-15,        os-tag: macos,   arch-tag: arm64  }
          - { os: windows-latest,  os-tag: windows, arch-tag: x86_64 }
    steps:
      - name: Support longpaths
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true
      - uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: '>=16.4'
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: addon
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 libgl-dev libx11-dev jq zip
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install jq || true
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install -y jq zip ninja
      - name: Checkout CLAP SDK
        uses: actions/checkout@v4
        with:
          repository: free-audio/clap
          path: clap-sdk
      - name: Set up Boost
        shell: bash
        run: |
          curl -fsSL https://github.com/ossia/score-sdk/releases/download/sdk31/boost_1_90_0.tar.gz -o boost.tar.gz
          mkdir -p boost/include
          tar -xzf boost.tar.gz --strip-components=1 -C boost/include
      - name: Configure & build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S addon -B addon/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/clap-sdk" \
            -DBOOST_ROOT="$PWD/boost" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
