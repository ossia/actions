  # ---------------- godot-composite ----------------
  # Godot expects a single addons/<name>/ folder containing the
  # .gdextension config(s) plus a per-platform `bin/<os>-<arch>/` dir.
  # Each per-OS zip already lays this out for one platform; we union them.
  # The .gdextension files reference all platforms regardless, so taking
  # any one of them is fine.
  godot-composite:
    if: ${{ inputs.godot }}
    needs: godot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: godot-*
          merge-multiple: false
          path: per-os
      - name: Install zip tools
        shell: bash
        run: |
          sudo apt -y update
          sudo apt install -yqq gcc-14 g++-14 zip unzip
      - name: Merge per-OS Godot artifacts
        shell: bash
        run: |
          set -euo pipefail
          ADDON="${{ github.event.repository.name }}"
          mkdir -p "staging/addons/$ADDON/bin"

          shopt -s nullglob
          ZIPS=( per-os/*/${ADDON}-godot-*.zip )
          if [[ ${#ZIPS[@]} -eq 0 ]]; then
            echo "Error: no per-OS godot artifacts found under per-os/"
            ls -lR per-os || true
            exit 1
          fi

          GDEXT_TAKEN=0
          for z in "${ZIPS[@]}"; do
            dest="unzipped-$(basename "$z" .zip)"
            mkdir -p "$dest"
            unzip -o "$z" -d "$dest"

            SRC="$dest/$ADDON"
            if [[ ! -d "$SRC" ]]; then
              echo "Warning: per-OS zip $z had no $ADDON/ root, skipping"
              rm -rf "$dest"
              continue
            fi

            # Take .gdextension config files from the first zip only.
            # All per-OS zips emit identical .gdextension content (rewritten
            # to point at bin/<os>-<arch>/...) — taking one is enough.
            if [[ "$GDEXT_TAKEN" -eq 0 ]]; then
              while IFS= read -r -d '' cfg; do
                cp -f "$cfg" "staging/addons/$ADDON/"
              done < <(find "$SRC" -maxdepth 1 -type f -name '*.gdextension' -print0)
              # Also copy LICENSE/README from the first zip if present
              for f in LICENSE LICENSE.txt LICENSE.md README README.md README.txt; do
                if [[ -f "$SRC/$f" ]]; then
                  cp -f "$SRC/$f" "staging/addons/$ADDON/"
                fi
              done
              GDEXT_TAKEN=1
            fi

            # Union all bin/<os>-<arch>/ folders (each per-OS zip contributes one)
            if [[ -d "$SRC/bin" ]]; then
              cp -R "$SRC/bin/." "staging/addons/$ADDON/bin/" 2>/dev/null || true
            fi

            rm -rf "$dest"
          done

          echo "Composite Godot package contents:"
          find "staging/addons/$ADDON" -maxdepth 4 -print

          (cd staging && zip -r "../${ADDON}-godot-composite.zip" "addons")
          ls -lah "${ADDON}-godot-composite.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: godot-composite
          path: '*-godot-composite.zip'

